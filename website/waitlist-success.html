<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>You're on the list, KleoKlaw</title>
  <meta name="description" content="Thanks for joining the KleoKlaw waitlist." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <script>
    if (sessionStorage.getItem("ck_waitlist_submitted") !== "1") {
      location.replace("/waitlist.html");
    } else {
      sessionStorage.removeItem("ck_waitlist_submitted");
    }
    if (sessionStorage.getItem("ck-page-transition")) {
      document.documentElement.classList.add("page-pre-enter");
    }
  </script>
</head>

<body class="waitlist-page waitlist-success-page">
  <header class="header">
    <div class="header-inner header-inner--no-cta">
      <a href="/" class="logo">KleoKlaw</a>
      <nav class="header-nav" aria-label="Page sections">
        <a href="/">Home</a>
        <a href="/#how-it-works">How it works</a>
        <a href="/#features">Features</a>
        <a href="/#integrations">Integrations</a>
      </nav>
    </div>
  </header>

  <div class="page-content">
    <main class="hero waitlist-main">
      <section class="hero-content waitlist-content">
        <div class="waitlist-card waitlist-success-card">
          <button type="button" class="waitlist-success-close" id="success-close" aria-label="Close and go home">
            ×
          </button>

          <div class="waitlist-success-body">
            <div class="waitlist-success-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2.5" />
                <path d="M20 33.5 28.5 42 44 26" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </div>

            <h1 class="waitlist-success-title" id="success-title">You're on the list</h1>
            <p class="waitlist-success-message" id="success-message">We'll be in touch.</p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>© KleoKlaw</span>
    </footer>
  </div>

  <script src="/transitions.js" type="module"></script>
  <script src="/waitlist-success.js" type="module"></script>
  <script>
    if (new URLSearchParams(location.search).get("via") === "email") {
      document.getElementById("success-title").textContent = "Check your email";
      document.getElementById("success-message").textContent = "We sent you a verification link. Click it to confirm your spot.";
    }
  </script>
</body>

</html>
