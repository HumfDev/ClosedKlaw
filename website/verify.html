<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KleoKlaw — Verify email</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #fff 0%, #f4f6f8 100%);
      color: #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; line-height: 1.5; color: #444; font-size: 0.95rem; }
    button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #f8f9fa; }
    .status { margin-top: 16px; font-size: 0.9rem; min-height: 1.4em; }
    .status.error { color: #c62828; }
    .status.ok { color: #2e7d32; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verify your email</h1>
    <p id="intro">Sign in with Google so KleoKlaw can use your verified email for job applications. We'll text you the next step automatically.</p>
    <button id="google-btn" type="button" disabled>
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div id="status" class="status" role="status"></div>
    <p id="done-msg" class="hidden status ok">Verified! Check your texts for the next step.</p>
  </div>
  <script src="/onboarding/web-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
    } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

    const API_BASE = window.KLEOKLAW_API_BASE || "";

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session");
    const statusEl = document.getElementById("status");
    const doneMsg = document.getElementById("done-msg");
    const btn = document.getElementById("google-btn");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (isError ? " error" : "");
    }

    if (!sessionId) {
      setStatus("Missing session link. Open the URL from your SMS.", true);
      throw new Error("no session");
    }

    let firebaseAuth;
    try {
      const res = await fetch(`${API_BASE}/onboarding/verify/config`);
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || res.statusText);
      }
      const config = await res.json();
      const app = initializeApp(config);
      firebaseAuth = getAuth(app);
      btn.disabled = false;
    } catch (err) {
      setStatus(String(err.message || err), true);
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      setStatus("Opening Google sign-in…");
      try {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: "select_account" });
        const cred = await signInWithPopup(firebaseAuth, provider);
        const idToken = await cred.user.getIdToken();
        const confirmRes = await fetch(`${API_BASE}/onboarding/verify/confirm`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, id_token: idToken }),
        });
        const body = await confirmRes.json().catch(() => ({}));
        if (!confirmRes.ok) {
          throw new Error(body.detail || confirmRes.statusText);
        }
        setStatus("");
        doneMsg.classList.remove("hidden");
        document.getElementById("intro").classList.add("hidden");
        btn.classList.add("hidden");
      } catch (err) {
        setStatus(String(err.message || err), true);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
