<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2a5f6e" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>KleoKlaw — Jobs over iMessage</title>
  <meta name="description" content="Find your next job through your texts. Join the KleoKlaw waitlist." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <script>
    if (sessionStorage.getItem("ck-page-transition")) {
      document.documentElement.classList.add("page-pre-enter");
    }
  </script>
</head>

<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="bg-warm" aria-hidden="true"></div>

  <header class="header">
    <a href="/" class="logo">KleoKlaw</a>
    <a href="/waitlist.html" class="btn-join btn-join--header">
      <svg class="imessage-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor"
          d="M12 2C6.48 2 2 6.02 2 10.88c0 2.74 1.44 5.18 3.7 6.74L5 22l4.38-2.41c.84.12 1.7.18 2.62.18 5.52 0 10-4.02 10-8.88S17.52 2 12 2z" />
      </svg>
      Join waitlist
    </a>
  </header>

  <div class="page-content">
    <main class="hero">
      <section class="hero-content">
        <div class="hero-copy">
          <h1>Find a job,<br />from your texts.</h1>
        </div>

        <div class="hero-cta">
          <a href="/waitlist.html" class="btn-join btn-join--hero">
            <svg class="imessage-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor"
                d="M12 2C6.48 2 2 6.02 2 10.88c0 2.74 1.44 5.18 3.7 6.74L5 22l4.38-2.41c.84.12 1.7.18 2.62.18 5.52 0 10-4.02 10-8.88S17.52 2 12 2z" />
            </svg>
            Join waitlist
          </a>
        </div>
      </section>

      <div class="hero-phone-clip" aria-hidden="true">
        <img class="hero-phone" src="/images/hero-phone.png" alt="" width="401" height="623" decoding="async" />
      </div>
    </main>

    <footer class="footer">
      <span>© KleoKlaw</span>
    </footer>
  </div>

  <script src="/transitions.js" type="module"></script>
</body>

</html>
