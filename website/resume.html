<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KleoKlaw — Upload resume</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #fff 0%, #f4f6f8 100%);
      color: #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; line-height: 1.5; color: #444; font-size: 0.95rem; }
    input[type="file"] {
      width: 100%;
      margin-bottom: 16px;
      font-size: 0.95rem;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #007aff, #5856d6);
      color: #fff;
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status { margin-top: 16px; font-size: 0.9rem; min-height: 1.4em; }
    .status.error { color: #c62828; }
    .status.ok { color: #2e7d32; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload your resume</h1>
    <p id="intro">Send a PDF (or Word doc). We'll text you a summary to confirm.</p>
    <form id="upload-form">
      <input id="file-input" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" required />
      <button id="upload-btn" type="submit">Upload resume</button>
    </form>
    <div id="status" class="status" role="status"></div>
    <p id="done-msg" class="hidden status ok">Got it! Check your texts to confirm your resume.</p>
  </div>
  <script src="/onboarding/web-config.js"></script>
  <script>
    const API_BASE = window.KLEOKLAW_API_BASE || "";
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session");
    const statusEl = document.getElementById("status");
    const doneMsg = document.getElementById("done-msg");
    const form = document.getElementById("upload-form");
    const btn = document.getElementById("upload-btn");
    const fileInput = document.getElementById("file-input");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (isError ? " error" : "");
    }

    if (!sessionId) {
      setStatus("Missing session link. Open the URL from your SMS.", true);
      form.classList.add("hidden");
      throw new Error("no session");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        setStatus("Pick a PDF or Word file first.", true);
        return;
      }
      btn.disabled = true;
      setStatus("Uploading…");
      try {
        const body = new FormData();
        body.append("session_id", sessionId);
        body.append("file", file, file.name);
        const res = await fetch(`${API_BASE}/onboarding/resume/upload`, {
          method: "POST",
          body,
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) {
          const detail = payload.detail;
          const msg = typeof detail === "string"
            ? detail
            : detail?.message || res.statusText;
          throw new Error(msg);
        }
        setStatus("");
        doneMsg.classList.remove("hidden");
        document.getElementById("intro").classList.add("hidden");
        form.classList.add("hidden");
      } catch (err) {
        setStatus(String(err.message || err), true);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
