<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f0f0f0" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Email verified, KleoKlaw</title>
    <meta name="description" content="Your email has been verified. You're on the KleoKlaw waitlist." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="waitlist-page waitlist-success-page">
    <div class="bg" aria-hidden="true"></div>
    <div class="bg-warm" aria-hidden="true"></div>

    <header class="header">
      <a href="/" class="logo">KleoKlaw</a>
    </header>

    <div class="page-content">
      <main class="hero waitlist-main">
        <section class="hero-content waitlist-content">
          <div class="waitlist-card waitlist-success-card">
            <div class="waitlist-success-body">
              <div class="waitlist-success-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2.5" />
                  <path
                    d="M20 33.5 28.5 42 44 26"
                    stroke="currentColor"
                    stroke-width="3"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>

              <h1 class="waitlist-success-title">You're verified</h1>
              <p class="waitlist-success-message">Your email is confirmed. We'll text you when KleoKlaw is live.</p>
              <a href="/" class="btn-submit" style="display:inline-block;text-align:center;margin-top:8px;text-decoration:none;">Back to home</a>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>© KleoKlaw</span>
      </footer>
    </div>
  </body>
</html>
